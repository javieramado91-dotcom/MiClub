<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugadores - Mi Club</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <script>try{var t=localStorage.getItem('miclub-tema');if(t)document.documentElement.setAttribute('data-tema',t);}catch(e){}</script>
    <link rel="stylesheet" href="css/globales.css">
    <link rel="stylesheet" href="css/componentes.css">
</head>
<body>

    <header class="app-header">
        <div class="marca">
            <img id="escudo-header" src="assets/escudo-default.svg" alt="Escudo">
            <span id="nombre-header">Mi Club</span>
        </div>
        <nav class="app-nav">
            <a href="dashboard.html">Inicio</a>
            <a href="equipo.html">Equipo</a>
            <a href="jugadores.html" class="activo">Jugadores</a>
            <a href="partidos.html">Partidos</a>
            <a href="estadisticas.html">Estadísticas</a>
            <a href="convocados.html">Convocados</a>
            <a href="#" data-cerrar-sesion>Salir</a>
        </nav>
    </header>

    <main style="display:block;">
        <div class="contenedor">

            <div class="tarjeta">
                <h2>Agregar jugador</h2>
                <form id="form-jugador">
                    <div class="grupo-input">
                        <label for="nombre">Nombre y apellido</label>
                        <input type="text" id="nombre" required placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="grupo-input">
                        <label for="fecha-nac">Fecha de nacimiento</label>
                        <input type="date" id="fecha-nac" required>
                        <small id="edad-preview" style="color:#777;"></small>
                    </div>
                    <div class="grupo-input">
                        <label for="posicion">Puesto</label>
                        <select id="posicion" required>
                            <option value="">Seleccionar...</option>
                            <option value="Arquero">Arquero</option>
                            <option value="Defensor">Defensor</option>
                            <option value="Mediocampista">Mediocampista</option>
                            <option value="Delantero">Delantero</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-principal">Guardar jugador</button>
                </form>
            </div>

            <div class="tarjeta">
                <h2>Plantel</h2>
                <div class="tabla-scroll">
                <table class="tabla-datos">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th class="centro">Edad</th>
                            <th>Puesto</th>
                            <th class="centro">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="lista-jugadores">
                        <tr><td colspan="4" class="mensaje-vacio">Cargando...</td></tr>
                    </tbody>
                </table>
                </div>
            </div>

        </div>
    </main>

    <footer class="firma-ja">
        <p>Desarrollado por <strong>JA</strong></p>
    </footer>

    <script type="module" src="js/jugadores.js"></script>
</body>
</html>
