<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas - Mi Club</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <script>try{var t=localStorage.getItem('miclub-tema');if(t)document.documentElement.setAttribute('data-tema',t);}catch(e){}</script>
    <link rel="stylesheet" href="css/globales.css">
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/tablas.css">
    <!-- Librería para convertir HTML en imagen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header class="app-header">
        <div class="marca">
            <img id="escudo-header" src="assets/escudo-default.svg" alt="Escudo">
            <span id="nombre-header">Mi Club</span>
        </div>
        <nav class="app-nav">
            <a href="dashboard.html">Inicio</a>
            <a href="equipo.html">Equipo</a>
            <a href="jugadores.html">Jugadores</a>
            <a href="estadisticas.html" class="activo">Estadísticas</a>
            <a href="#" data-cerrar-sesion>Salir</a>
        </nav>
    </header>

    <main style="display:block;">
        <div class="contenedor">

            <!-- CARGA DE EVENTOS -->
            <div class="tarjeta">
                <h2>Cargar estadísticas</h2>
                <table class="tabla-datos">
                    <thead>
                        <tr>
                            <th>Jugador</th>
                            <th class="centro">Goles</th>
                            <th class="centro">Asist.</th>
                            <th class="centro">Amar.</th>
                            <th class="centro">Rojas</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-carga">
                        <tr><td colspan="5" class="mensaje-vacio">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- RANKINGS -->
            <div class="tarjeta">
                <h2>Tablas del equipo</h2>
                <p style="color:#777; margin-bottom:16px;">Cada tabla se puede exportar como historia de Instagram (1080×1920).</p>
                <div id="contenedor-rankings"></div>
            </div>

        </div>
    </main>

    <footer class="firma-ja">
        <p>Desarrollado por <strong>JA</strong></p>
    </footer>

    <!-- Contenedor oculto que se "fotografía" para la historia de IG -->
    <div id="historia-ig" class="historia-ig"></div>

    <script type="module" src="js/estadisticas.js"></script>
</body>
</html>
