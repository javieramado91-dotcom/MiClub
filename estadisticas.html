<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas - Mi Club</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <script>try{var t=localStorage.getItem('miclub-tema');if(t)document.documentElement.setAttribute('data-tema',t);}catch(e){}</script>
    <link rel="stylesheet" href="css/globales.css">
    <link rel="stylesheet" href="css/componentes.css">
</head>
<body>

    <header class="app-header">
        <div class="marca">
            <img id="escudo-header" src="assets/escudo-default.svg" alt="Escudo">
            <span id="nombre-header">Mi Club</span>
        </div>
        <nav class="app-nav">
            <a href="dashboard.html">Inicio</a>
            <a href="equipo.html">Equipo</a>
            <a href="jugadores.html">Jugadores</a>
            <a href="partidos.html">Partidos</a>
            <a href="estadisticas.html" class="activo">Estadísticas</a>
            <a href="convocados.html">Convocados</a>
            <a href="#" data-cerrar-sesion>Salir</a>
        </nav>
    </header>

    <main style="display:block;">
        <div class="contenedor">

            <!-- RESUMEN DEL PLANTEL -->
            <div class="tarjeta">
                <h2>Resumen del plantel</h2>
                <div class="stats-grid" id="resumen-plantel" style="margin-top:8px;">
                    <p class="mensaje-vacio" style="grid-column:1/-1;">Cargando...</p>
                </div>
            </div>

            <!-- CARGA DE EVENTOS -->
            <div class="tarjeta">
                <h2>Cargar estadísticas</h2>
                <p style="color:var(--texto-suave); margin-bottom:14px; font-size:0.9rem;">Usá los botones + / − para sumar o restar a cada jugador.</p>

                <div class="toolbar-filtros">
                    <input type="search" id="buscador" class="input-busqueda" placeholder="🔍 Buscar jugador por nombre...">
                    <select id="filtro-posicion" class="select-filtro">
                        <option value="">Todas las posiciones</option>
                        <option value="Arquero">Arquero</option>
                        <option value="Defensor">Defensor</option>
                        <option value="Mediocampista">Mediocampista</option>
                        <option value="Delantero">Delantero</option>
                    </select>
                </div>

                <div class="tabla-scroll tabla-scroll-alto">
                <table class="tabla-datos">
                    <thead>
                        <tr>
                            <th>Jugador</th>
                            <th class="centro">📋 PJ</th>
                            <th class="centro">⚽ Goles</th>
                            <th class="centro">🎯 Asist.</th>
                            <th class="centro">🟨 Amar.</th>
                            <th class="centro">🟥 Rojas</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-carga">
                        <tr><td colspan="6" class="mensaje-vacio">Cargando...</td></tr>
                    </tbody>
                </table>
                </div>
            </div>

            <!-- RANKINGS -->
            <div class="tarjeta">
                <h2>Tablas del equipo</h2>
                <div id="contenedor-rankings"></div>
            </div>

        </div>
    </main>

    <footer class="firma-ja">
        <p>Desarrollado por <strong>JA</strong></p>
    </footer>

    <script type="module" src="js/estadisticas.js"></script>
</body>
</html>
