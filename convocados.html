<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convocados - Mi Club</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <script>try{var t=localStorage.getItem('miclub-tema');if(t)document.documentElement.setAttribute('data-tema',t);}catch(e){}</script>
    <link rel="stylesheet" href="css/globales.css">
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/convocados.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header class="app-header">
        <div class="marca">
            <img id="escudo-header" src="assets/escudo-default.svg" alt="Escudo">
            <span id="nombre-header">Mi Club</span>
        </div>
        <nav class="app-nav">
            <a href="dashboard.html">Inicio</a>
            <a href="equipo.html">Equipo</a>
            <a href="jugadores.html">Jugadores</a>
            <a href="partidos.html">Partidos</a>
            <a href="estadisticas.html">Estadísticas</a>
            <a href="convocados.html" class="activo">Convocados</a>
            <a href="#" data-cerrar-sesion>Salir</a>
        </nav>
    </header>

    <main style="display:block;">
        <div class="contenedor">

            <!-- CONFIGURACIÓN -->
            <div class="tarjeta">
                <h2>Crear lista de convocados</h2>
                <div class="conv-config">
                    <div class="grupo-input">
                        <label for="conv-cantidad">Cantidad a convocar</label>
                        <input type="number" id="conv-cantidad" min="1" max="40" value="18">
                    </div>
                    <div class="grupo-input">
                        <label for="conv-torneo">Torneo (elegí o escribí)</label>
                        <input type="text" id="conv-torneo" list="lista-torneos" placeholder="Ej: Liga Apertura">
                        <datalist id="lista-torneos"></datalist>
                    </div>
                    <div class="grupo-input">
                        <label for="conv-fecha">Fecha / Instancia</label>
                        <input type="text" id="conv-fecha" placeholder="Ej: Fecha 5 o Cuartos de final">
                    </div>
                    <div class="grupo-input">
                        <label for="conv-dt">Director técnico (elegí o escribí)</label>
                        <input type="text" id="conv-dt" list="lista-dt" placeholder="Nombre del DT">
                        <datalist id="lista-dt"></datalist>
                    </div>
                </div>
            </div>

            <!-- SELECCIÓN DE JUGADORES -->
            <div class="tarjeta">
                <div class="fila-titulo">
                    <h2>Seleccioná los convocados</h2>
                    <span class="conv-contador" id="conv-contador">0 / 18</span>
                </div>
                <div class="toolbar-filtros">
                    <input type="search" id="conv-buscar" class="input-busqueda" placeholder="🔍 Buscar jugador...">
                </div>
                <div id="conv-seleccion">
                    <p class="mensaje-vacio">Cargando jugadores...</p>
                </div>
            </div>

            <!-- EXPORTAR -->
            <div class="tarjeta">
                <h2>Exportar imagen</h2>
                <p style="color:var(--texto-suave); font-size:0.9rem; margin-bottom:14px;">Elegí el formato según dónde la vas a publicar.</p>
                <div class="conv-export">
                    <button class="btn-principal" id="exp-historia">📲 Exportar para historia (9:16)</button>
                    <button class="btn-secundario" id="exp-feed">🖼️ Exportar para feed (4:5)</button>
                </div>
            </div>

        </div>
    </main>

    <footer class="firma-ja">
        <p>Desarrollado por <strong>JA</strong></p>
    </footer>

    <!-- Contenedor oculto para exportar la convocatoria -->
    <div id="export-conv" class="export-conv r916"></div>

    <script type="module" src="js/convocados.js"></script>
</body>
</html>
