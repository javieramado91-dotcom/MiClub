<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Equipo - Mi Club</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <script>try{var t=localStorage.getItem('miclub-tema');if(t)document.documentElement.setAttribute('data-tema',t);}catch(e){}</script>
    <link rel="stylesheet" href="css/globales.css">
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/equipo.css">
</head>
<body>
    <header class="app-header">
        <div class="marca">
            <img id="escudo-header" src="assets/escudo-default.svg" alt="Escudo">
            <span id="nombre-header">Mi Club</span>
        </div>
        <nav class="app-nav">
            <a href="dashboard.html">Inicio</a>
            <a href="equipo.html" class="activo">Equipo</a>
            <a href="jugadores.html">Jugadores</a>
            <a href="partidos.html">Partidos</a>
            <a href="estadisticas.html">Estadísticas</a>
            <a href="#" data-cerrar-sesion>Salir</a>
        </nav>
    </header>

    <main style="display:block;">
        <div class="contenedor" style="max-width:780px;">

            <!-- BANNER / PERFIL DEL CLUB (vista previa en vivo) -->
            <div class="club-banner">
                <img class="club-banner-escudo" id="banner-escudo" src="assets/escudo-default.svg" alt="Escudo">
                <div class="club-banner-info">
                    <h1 id="banner-nombre">Mi Club</h1>
                    <div class="club-apodo" id="banner-apodo"></div>
                    <div class="club-chips" id="banner-chips"></div>
                </div>
            </div>

            <!-- DATOS DEL EQUIPO -->
            <div class="tarjeta">
                <h2>Datos del club</h2>
                <form id="form-equipo">
                    <div class="datos-grid">
                        <div class="grupo-input col-full">
                            <label for="nombre-equipo">Nombre del club</label>
                            <input type="text" id="nombre-equipo" required placeholder="Ej: Atlético Independiente">
                        </div>
                        <div class="grupo-input">
                            <label for="apodo">Apodo / Mote</label>
                            <input type="text" id="apodo" placeholder="Ej: El Rojo">
                        </div>
                        <div class="grupo-input">
                            <label for="fundacion">Fecha de fundación</label>
                            <input type="date" id="fundacion">
                        </div>
                        <div class="grupo-input">
                            <label for="ciudad">Ciudad</label>
                            <input type="text" id="ciudad" placeholder="Ej: Avellaneda">
                        </div>
                        <div class="grupo-input">
                            <label for="estadio">Estadio</label>
                            <input type="text" id="estadio" placeholder="Ej: Libertadores de América">
                        </div>
                        <div class="grupo-input">
                            <label for="dt">Director técnico</label>
                            <input type="text" id="dt" placeholder="Ej: Juan Pérez">
                        </div>
                        <div class="grupo-input">
                            <label for="liga">Liga / Categoría</label>
                            <input type="text" id="liga" placeholder="Ej: Primera División">
                        </div>
                    </div>

                    <hr style="border:none; border-top:1px solid var(--borde); margin:18px 0;">

                    <div class="grupo-input">
                        <label for="input-escudo">Escudo (imagen)</label>
                        <input type="file" id="input-escudo" accept="image/*">
                        <div class="previsualizacion" id="vista-previa">
                            <p style="font-size: 12px; color: var(--texto-suave);">Sin escudo</p>
                        </div>
                    </div>

                    <div class="grupo-colores">
                        <div class="control-color grupo-input">
                            <label for="color-1">Color principal</label>
                            <input type="color" id="color-1" value="#2c3e50">
                        </div>
                        <div class="control-color grupo-input">
                            <label for="color-2">Color secundario</label>
                            <input type="color" id="color-2" value="#34495e">
                        </div>
                    </div>

                    <button type="submit" class="btn-principal" style="margin-top:10px;">Guardar cambios</button>
                </form>
            </div>

            <!-- PALMARÉS -->
            <div class="tarjeta">
                <h2>🏆 Palmarés</h2>
                <p style="color:var(--texto-suave); font-size:0.9rem; margin-bottom:16px;">Cargá los títulos y logros del club.</p>

                <form id="form-titulo" class="palmares-form">
                    <div class="grupo-input pf-titulo">
                        <label for="titulo-nombre">Título</label>
                        <input type="text" id="titulo-nombre" required placeholder="Ej: Liga local">
                    </div>
                    <div class="grupo-input pf-cant">
                        <label for="titulo-cant">Cantidad</label>
                        <input type="number" id="titulo-cant" min="1" value="1" required>
                    </div>
                    <button type="submit" class="btn-principal">Agregar</button>
                </form>

                <div id="lista-palmares">
                    <p class="mensaje-vacio">Todavía no cargaste títulos.</p>
                </div>
            </div>

            <!-- CUENTA -->
            <div class="tarjeta">
                <h2>Cuenta</h2>
                <p style="color:var(--texto-suave); font-size:0.9rem; margin-bottom:18px;">
                    Sesión iniciada como <strong id="cuenta-email" style="color:var(--texto);">...</strong>
                </p>

                <form id="form-password">
                    <div class="grupo-input">
                        <label for="pass-actual">Contraseña actual</label>
                        <div class="campo">
                            <svg class="campo-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                            <input type="password" id="pass-actual" required placeholder="Tu contraseña actual" autocomplete="current-password">
                            <button type="button" class="ver-pass" aria-label="Mostrar contraseña"></button>
                        </div>
                    </div>

                    <div class="grupo-input">
                        <label for="pass-nueva">Nueva contraseña</label>
                        <div class="campo">
                            <svg class="campo-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                            <input type="password" id="pass-nueva" required minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                            <button type="button" class="ver-pass" aria-label="Mostrar contraseña"></button>
                        </div>
                    </div>

                    <div class="grupo-input">
                        <label for="pass-nueva2">Repetir nueva contraseña</label>
                        <div class="campo">
                            <svg class="campo-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                            <input type="password" id="pass-nueva2" required minlength="6" placeholder="••••••••" autocomplete="new-password">
                            <button type="button" class="ver-pass" aria-label="Mostrar contraseña"></button>
                        </div>
                    </div>

                    <button type="submit" class="btn-secundario" style="margin-top:8px;">Cambiar contraseña</button>
                </form>
            </div>

        </div>
    </main>

    <footer class="firma-ja">
        <p>Desarrollado por <strong>JA</strong></p>
    </footer>

    <script type="module" src="js/equipo.js"></script>
</body>
</html>
